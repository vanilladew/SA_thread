<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>멘션 스레드</title>
<style>
  :root {
    --bg: #ffffff;
    --bg-hover: #f7f7f7;
    --border: #eff3f4;
    --text-primary: #0f1419;
    --text-secondary: #536471;
    --blue: #1d9bf0;
    --blue-hover: #1a8cd8;
    --pink: #f91880;
    --green: #00ba7c;
    --avatar-grad-1: #1d9bf0;
    --avatar-grad-2: #7856ff;
    --me-bg: #eff8ff;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    font-family: "Segoe UI", "Apple SD Gothic Neo", "Malgun Gothic", -apple-system,
      BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
    color: var(--text-primary);
  }

  .app {
    max-width: 600px;
    margin: 0 auto;
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
    min-height: 100vh;
  }

  /* Header */
  .header {
    position: sticky;
    top: 0;
    z-index: 10;
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .header svg.back {
    width: 19px;
    height: 19px;
    flex-shrink: 0;
  }

  .header-text h1 {
    font-size: 20px;
    font-weight: 800;
    margin: 0;
    line-height: 1.2;
  }

  .header-text span {
    font-size: 13px;
    color: var(--text-secondary);
  }

  /* Tweet item */
  .tweet {
    display: flex;
    gap: 12px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    position: relative;
    transition: background-color 0.15s ease;
  }

  .tweet:hover {
    background: var(--bg-hover);
  }

  .tweet.is-me {
    background: var(--me-bg);
  }

  .tweet.is-me:hover {
    background: #e3f3ff;
  }

  .thread-line {
    position: absolute;
    left: 35px;
    top: 52px;
    bottom: -12px;
    width: 2px;
    background: var(--border);
  }

  .tweet:last-child .thread-line {
    display: none;
  }

  .avatar-col {
    flex-shrink: 0;
    position: relative;
    z-index: 1;
  }

  .avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--avatar-grad-1), var(--avatar-grad-2));
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-weight: 700;
    font-size: 15px;
    user-select: none;
  }

  .content-col {
    flex: 1;
    min-width: 0;
  }

  .tweet-header {
    display: flex;
    align-items: center;
    gap: 4px;
    flex-wrap: wrap;
    font-size: 15px;
    line-height: 20px;
  }

  .name {
    font-weight: 700;
    color: var(--text-primary);
  }

  .badge {
    display: inline-flex;
    width: 16px;
    height: 16px;
  }

  .handle, .dot, .time {
    color: var(--text-secondary);
  }

  .me-tag {
    margin-left: 2px;
    font-size: 12px;
    font-weight: 700;
    color: var(--blue);
    background: rgba(29, 155, 240, 0.1);
    padding: 1px 7px;
    border-radius: 4px;
  }

  .reply-to {
    font-size: 14px;
    color: var(--text-secondary);
    margin-top: 2px;
    margin-bottom: 2px;
  }

  .reply-to a {
    color: var(--blue);
    text-decoration: none;
  }

  .tweet-text {
    font-size: 15px;
    line-height: 20px;
    margin-top: 2px;
    white-space: pre-wrap;
    word-wrap: break-word;
    color: var(--text-primary);
  }

  .tweet-text:empty::before {
    content: "(멘션 내용을 mentions.json 파일에 입력하세요)";
    color: var(--text-secondary);
    font-style: italic;
  }

  .meta-row {
    margin-top: 12px;
    font-size: 14px;
    color: var(--text-secondary);
  }

  .meta-row .full-time {
    color: var(--text-secondary);
  }

  .stats-row {
    display: flex;
    gap: 0;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
    max-width: 425px;
  }

  .stat {
    display: flex;
    align-items: center;
    gap: 4px;
    flex: 1;
    font-size: 13px;
    color: var(--text-secondary);
    cursor: pointer;
  }

  .stat svg {
    width: 18px;
    height: 18px;
  }

  .stat.reply:hover { color: var(--blue); }
  .stat.retweet:hover { color: var(--green); }
  .stat.like:hover { color: var(--pink); }

  .actions-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 12px;
    max-width: 425px;
  }

  .action {
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--text-secondary);
    font-size: 13px;
    cursor: default;
  }

  .action svg {
    width: 18.75px;
    height: 18.75px;
  }

  .action.reply:hover { color: var(--blue); }
  .action.retweet:hover { color: var(--green); }
  .action.like:hover { color: var(--pink); }
  .action.view:hover { color: var(--blue); }
  .action.share:hover { color: var(--blue); }

  /* Empty state */
  .empty-state {
    padding: 60px 24px;
    text-align: center;
    color: var(--text-secondary);
  }

  .empty-state h2 {
    color: var(--text-primary);
    font-size: 17px;
  }

  /* Footer note for editing */
  .footer-note {
    padding: 16px;
    text-align: center;
    font-size: 12px;
    color: var(--text-secondary);
  }

  @media (max-width: 600px) {
    .app { border-left: none; border-right: none; }
  }
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <svg class="back" viewBox="0 0 24 24" fill="none">
      <path d="M19 12H5M12 19l-7-7 7-7" stroke="#0f1419" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <div class="header-text">
      <h1>스레드</h1>
      <span id="tweet-count">0개의 멘션</span>
    </div>
  </div>

  <div id="thread-container"></div>

  <div class="footer-note">
    data/mentions.json 파일을 수정하면 이 페이지에 자동 반영됩니다.
  </div>
</div>

<script>
  // SVG 아이콘들 (X 디자인 시스템과 동일한 라인 스타일)
  const ICONS = {
    reply: `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M1.751 10c0-4.42 3.584-8 8.005-8h4.366c4.49 0 8.129 3.64 8.129 8.13 0 2.96-1.607 5.68-4.196 7.11l-8.054 4.46v-3.69h-.067c-4.49.1-8.183-3.51-8.183-8.01z"/></svg>`,
    retweet: `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M4.5 3.88l4.43 4.43-1.43 1.43-2-2V15c0 1.1.9 2 2 2H13v2H7.5c-2.21 0-4-1.79-4-4V7.74l-2 2-1.43-1.43L4.5 3.88zM16.5 6H11V4h5.5c2.21 0 4 1.79 4 4v9.26l2-2 1.43 1.43L19.5 21.12l-4.43-4.43 1.43-1.43 2 2V8c0-1.1-.9-2-2-2z"/></svg>`,
    like: `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M16.697 5.5c-1.222-.06-2.679.51-3.89 2.16l-.805 1.09-.806-1.09C9.984 6.01 8.526 5.44 7.304 5.5c-1.243.07-2.349.78-2.91 1.91-.552 1.12-.633 2.78.479 4.82 1.074 1.97 3.257 4.27 7.129 6.61 3.87-2.34 6.052-4.64 7.126-6.61 1.111-2.04 1.03-3.7.477-4.82-.561-1.13-1.666-1.84-2.908-1.91zm4.187 7.69c-1.351 2.48-4.001 5.12-8.379 7.67l-.503.3-.504-.3c-4.379-2.55-7.029-5.19-8.382-7.67-1.36-2.5-1.41-4.86-.514-6.67.887-1.79 2.647-2.91 4.601-3.01 1.651-.09 3.368.56 4.798 2.01 1.429-1.45 3.146-2.1 4.796-2.01 1.954.1 3.714 1.22 4.601 3.01.896 1.81.846 4.17-.514 6.67z"/></svg>`,
    view: `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8.75 21V3h2v18h-2zM18 21V8.5h2V21h-2zM4 21l.004-10h2L6 21H4zm9.248 0v-7h2v7h-2z"/></svg>`,
    share: `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.59l5.7 5.7-1.41 1.42L13 6.41V16h-2V6.41l-3.29 3.3-1.41-1.42L12 2.59zM21 15l-.02 3.51c0 1.38-1.12 2.49-2.5 2.49H5.5C4.11 21 3 19.88 3 18.5V15h2v3.5c0 .28.22.5.5.5h12.98c.28 0 .5-.22.5-.5L19 15h2z"/></svg>`,
    verified: `<svg viewBox="0 0 22 22" fill="#1d9bf0"><path d="M20.396 11c-.018-.646-.215-1.275-.57-1.816-.354-.54-.852-.972-1.438-1.246.223-.607.27-1.264.14-1.897-.131-.634-.437-1.218-.882-1.687-.47-.445-1.053-.75-1.687-.882-.633-.13-1.29-.083-1.897.14-.273-.587-.704-1.086-1.245-1.44S11.647 1.62 11 1.604c-.646.017-1.273.213-1.813.568s-.969.854-1.24 1.44c-.608-.223-1.267-.272-1.902-.14-.635.13-1.22.436-1.69.882-.445.47-.749 1.055-.878 1.688-.13.633-.08 1.29.144 1.896-.587.274-1.087.705-1.443 1.245-.356.54-.555 1.17-.574 1.817.02.647.218 1.276.574 1.817.356.54.856.972 1.443 1.245-.224.606-.274 1.263-.144 1.896.13.634.433 1.218.877 1.688.47.443 1.054.747 1.687.878.633.132 1.29.084 1.897-.136.274.586.705 1.084 1.246 1.439.54.354 1.17.551 1.816.569.647-.016 1.276-.213 1.817-.567s.972-.854 1.245-1.44c.604.239 1.266.296 1.903.164.636-.132 1.22-.447 1.68-.907.46-.46.776-1.044.908-1.681s.075-1.299-.165-1.903c.586-.274 1.084-.705 1.439-1.246.354-.54.551-1.17.569-1.816zM9.662 14.85l-3.429-3.428 1.414-1.414 2.015 2.014 4.665-4.665 1.414 1.414-6.079 6.079z"/></svg>`
  };

  function escapeHtml(str) {
    if (!str) return "";
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function initials(name) {
    if (!name) return "?";
    return name.trim().charAt(0);
  }

  function renderTweet(tweet, index) {
    const isMe = tweet.isMe === true;
    const avatarHtml = tweet.avatar
      ? `<img src="${escapeHtml(tweet.avatar)}" style="width:40px;height:40px;border-radius:50%;object-fit:cover;" alt="">`
      : `<div class="avatar">${escapeHtml(initials(tweet.author))}</div>`;

    return `
      <div class="tweet ${isMe ? 'is-me' : ''}" data-id="${escapeHtml(tweet.id || index)}">
        <div class="thread-line"></div>
        <div class="avatar-col">${avatarHtml}</div>
        <div class="content-col">
          <div class="tweet-header">
            <span class="name">${escapeHtml(tweet.author || '이름 없음')}</span>
            <span class="handle">@${escapeHtml(tweet.handle || 'handle')}</span>
            <span class="dot">·</span>
            <span class="time">${escapeHtml(tweet.time || '')}</span>
            ${isMe ? '<span class="me-tag">나</span>' : ''}
          </div>
          <div class="tweet-text">${escapeHtml(tweet.content || '')}</div>
          <div class="actions-row">
            <div class="action reply">
              ${ICONS.reply}
              <span>${escapeHtml(tweet.replies || '0')}</span>
            </div>
            <div class="action retweet">
              ${ICONS.retweet}
              <span>${escapeHtml(tweet.retweets || '0')}</span>
            </div>
            <div class="action like">
              ${ICONS.like}
              <span>${escapeHtml(tweet.likes || '0')}</span>
            </div>
            <div class="action view">
              ${ICONS.view}
              <span>${escapeHtml(tweet.views || '0')}</span>
            </div>
            <div class="action share">
              ${ICONS.share}
            </div>
          </div>
        </div>
      </div>
    `;
  }

  async function loadThread() {
    const container = document.getElementById('thread-container');
    try {
      const res = await fetch('data/mentions.json', { cache: 'no-store' });
      if (!res.ok) throw new Error('파일을 불러올 수 없습니다');
      const data = await res.json();
      const items = data.thread || [];

      document.getElementById('tweet-count').textContent = `${items.length}개의 멘션`;

      if (items.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <h2>아직 멘션이 없습니다</h2>
            <p>data/mentions.json 파일에 멘션을 추가해보세요.</p>
          </div>
        `;
        return;
      }

      container.innerHTML = items.map((t, i) => renderTweet(t, i)).join('');
    } catch (err) {
      container.innerHTML = `
        <div class="empty-state">
          <h2>데이터를 불러오지 못했습니다</h2>
          <p>data/mentions.json 파일을 확인해주세요.</p>
        </div>
      `;
      console.error(err);
    }
  }

  loadThread();
</script>

</body>
</html>
